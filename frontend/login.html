<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水利数字孪生系统 | 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-body login-body">
<main class="login-shell">
    <section class="login-card">
        <div class="brand-mark">WT</div>
        <div class="eyebrow">Water Twin Login</div>
        <h1>登录水利数字孪生系统</h1>
        <p class="hero-copy">登录后可访问点云分析、统计导出和巡检提示页面。</p>

        <form id="loginForm" class="login-form">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input login-input" id="username" name="username" type="text" placeholder="请输入用户名" required>

            <label class="form-label" for="password">密码</label>
            <input class="form-input login-input" id="password" name="password" type="password" placeholder="请输入密码" required>

            <label class="login-check">
                <input type="checkbox" name="remember_me" value="1">
                <span>记住我</span>
            </label>

            <button class="btn btn-primary btn-block" id="btnLogin" type="submit">登录</button>
            <div id="loginError" class="login-error"></div>
        </form>

        <div class="login-tip">
            默认演示账号：`admin` / `admin123`
            <div class="login-links">
                <a href="/register.html">注册账号</a>
                <a href="/change-password.html">修改密码</a>
            </div>
        </div>
    </section>
</main>

<script src="js/auth.js"></script>
</body>
</html>
