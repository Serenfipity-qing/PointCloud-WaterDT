<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水利数字孪生系统 | 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-body login-body">
<main class="login-shell">
    <section class="login-card">
        <div class="brand-mark">WT</div>
        <div class="eyebrow">Water Twin Login</div>
        <h1>登录水利数字孪生系统</h1>

        <form id="loginForm" class="login-form">
            <label class="form-label" for="username">用户名</label>
            <input class="form-input login-input" id="username" name="username" type="text" placeholder="请输入用户名" autocomplete="username" required>

            <label class="form-label" for="password">密码</label>
            <input class="form-input login-input" id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required>

            <label class="login-check">
                <input type="checkbox" name="remember_me" value="1">
                <span>记住我</span>
            </label>

            <button class="btn btn-primary btn-block" id="btnLogin" type="submit">登录</button>
            <div id="loginError" class="login-error"></div>
        </form>

        <div class="login-tip">
            默认演示账号：`admin` / `admin123`
            <div class="login-links" role="navigation" aria-label="登录相关操作">
                <a class="login-link-card" href="/register.html">
                    <span class="login-link-card__title">注册账号</span>
                    <span class="login-link-card__desc">创建新的本地账号</span>
                </a>
                <a class="login-link-card" href="/change-password.html">
                    <span class="login-link-card__title">修改密码</span>
                    <span class="login-link-card__desc">更新当前账号密码</span>
                </a>
            </div>
        </div>
    </section>
</main>

<script src="js/auth.js"></script>
</body>
</html>
