<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水利数字孪生系统 | AI 助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-body">
<div class="site-shell">
    <aside class="site-sidebar">
        <div>
            <div class="brand-mark">WT</div>
            <h1>水利数字孪生系统</h1>
        </div>

        <nav class="nav-menu">
            <a class="nav-link" href="index.html">项目总览</a>
            <a class="nav-link" href="viewer.html">点云分析</a>
            <a class="nav-link" href="report.html">统计与导出</a>
            <a class="nav-link" href="inspection.html">巡检提示</a>
            <a class="nav-link" href="flood.html">防洪预警</a>
            <a class="nav-link" href="embankment.html">堤坝岸坡排查</a>
            <a class="nav-link active" href="ai.html">AI 助手</a>
        </nav>

        <div class="sidebar-panel" id="assistantTaskCard">
            <div class="sidebar-label">当前任务</div>
            <div class="sidebar-value">未分析</div>
            <div class="sidebar-text">请先在点云分析页完成一次语义分割。</div>
        </div>
    </aside>

    <main class="site-main site-main--assistant">
        <section class="assistant-shell">
            <aside class="assistant-history" id="assistantHistoryPanel">
                <div class="assistant-history__header">
                    <div>
                        <div class="sidebar-label">历史会话</div>
                        <div class="assistant-history__title">可直接切换旧对话</div>
                    </div>
                    <div class="assistant-history__header-actions">
                        <button class="btn btn-outline btn-sm" id="btnNewAssistantChat">新建对话</button>
                        <button class="btn btn-outline btn-sm" id="btnToggleAssistantHistory">折叠</button>
                    </div>
                </div>
                <div class="assistant-history__list" id="assistantSessionList"></div>
            </aside>

            <section class="assistant-workbench">
                <div class="assistant-workbench__header">
                    <div>
                        <div class="assistant-workbench__title" id="assistantWorkbenchTitle">当前对话</div>
                        <div class="assistant-session-tip" id="assistantSessionTip">当前会话将随页面切换自动保留。</div>
                    </div>
                    <div class="assistant-workbench__actions">
                        <button class="btn btn-outline btn-sm" id="btnClearAssistantCache">清空缓存</button>
                    </div>
                </div>

                <div class="assistant-thread" id="assistantChat">
                    <div class="assistant-empty" id="assistantEmptyState">
                        请选择问题模板或输入自由问题，然后点击“发送”开始分析。
                    </div>
                </div>

                <div class="assistant-composer">
                    <div class="assistant-toolbar">
                        <div class="assistant-toolbar-group">
                            <select class="assistant-select" id="assistantPreset">
                                <option value="">选择问题模板</option>
                                <option value="most-dangerous">哪里最危险？</option>
                                <option value="why-dangerous">为什么危险？</option>
                                <option value="what-check-first">建议先检查什么？</option>
                                <option value="summary">给我一个整体巡检总结</option>
                            </select>
                        </div>
                    </div>

                    <div class="assistant-input-wrap">
                        <textarea
                            class="assistant-textarea assistant-textarea--chat"
                            id="assistantQuestionInput"
                            placeholder="输入你的问题，例如：请结合当前风险区域，生成一段适合答辩汇报的巡检说明。"
                        ></textarea>
                        <button class="btn btn-primary assistant-send" id="btnAskAssistant">发送</button>
                    </div>
                </div>
            </section>
        </section>
    </main>
</div>

<script src="js/shared-state.js"></script>
<script src="js/auth.js"></script>
<script src="js/ai-assistant.js"></script>
</body>
</html>
