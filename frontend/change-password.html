<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水利数字孪生系统 | 修改密码</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-body login-body">
<main class="login-shell">
    <section class="login-card">
        <div class="brand-mark">WT</div>
        <div class="eyebrow">Change Password</div>
        <h1>修改密码</h1>
        <p class="hero-copy">登录后可在这里修改当前账号密码。</p>

        <form id="changePasswordForm" class="login-form">
            <label class="form-label" for="currentPassword">当前密码</label>
            <input class="form-input login-input" id="currentPassword" name="current_password" type="password" required>

            <label class="form-label" for="newPassword">新密码</label>
            <input class="form-input login-input" id="newPassword" name="new_password" type="password" required>

            <label class="form-label" for="confirmNewPassword">确认新密码</label>
            <input class="form-input login-input" id="confirmNewPassword" name="confirm_password" type="password" required>

            <button class="btn btn-primary btn-block" id="btnChangePassword" type="submit">修改密码</button>
            <div id="changePasswordError" class="login-error"></div>
        </form>

        <div class="login-tip">
            <a href="/index.html">返回首页</a>
        </div>
    </section>
</main>

<script src="js/auth.js"></script>
</body>
</html>
