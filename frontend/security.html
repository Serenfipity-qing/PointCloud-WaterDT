<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水利数字孪生系统 | 账号安全</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="site-body">
<div class="site-shell">
    <aside class="site-sidebar">
        <div>
            <div class="brand-mark">WT</div>
            <h1>水利数字孪生系统</h1>
        </div>

        <nav class="nav-menu">
            <a class="nav-link" href="index.html">项目总览</a>
            <a class="nav-link" href="viewer.html">点云分析</a>
            <a class="nav-link" href="report.html">统计与导出</a>
            <a class="nav-link" href="inspection.html">巡检提示</a>
            <a class="nav-link" href="flood.html">防洪预警</a>
            <a class="nav-link" href="embankment.html">堤坝岸坡排查</a>
            <a class="nav-link" href="ai.html">AI 助手</a>
            <a class="nav-link active" href="security.html">账号安全</a>
        </nav>
    </aside>

    <main class="site-main">
        <section class="page-header-card">
            <div>
                <div class="eyebrow">Admin Security Center</div>
                <h2>管理员安全中心与用户管理</h2>
                <p class="hero-copy">仅管理员可访问。支持异常事件高亮、审计日志清理、账号冻结/解冻/解锁/删除和新增用户。</p>
            </div>
        </section>

        <section class="summary-grid">
            <article class="stat-card">
                <div class="sidebar-label">用户总数</div>
                <div class="big-metric" id="securityTotalUsers">-</div>
            </article>
            <article class="stat-card">
                <div class="sidebar-label">管理员数量</div>
                <div class="big-metric" id="securityAdminCount">-</div>
            </article>
            <article class="stat-card">
                <div class="sidebar-label">冻结账号</div>
                <div class="big-metric" id="securityFrozenCount">-</div>
            </article>
            <article class="stat-card">
                <div class="sidebar-label">异常事件</div>
                <div class="big-metric" id="securityAbnormalCount">-</div>
            </article>
        </section>

        <section class="dashboard-grid security-dashboard-grid">
            <article class="info-card">
                <div class="section-kicker">新增用户</div>
                <h3>管理员创建账号</h3>
                <form id="adminCreateUserForm" class="login-form login-form--compact">
                    <input class="form-input" name="username" type="text" placeholder="用户名">
                    <input class="form-input" name="password" type="password" placeholder="初始密码">
                    <select class="form-input" name="role">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                    <button class="btn btn-primary btn-block" id="btnAdminCreateUser" type="submit">新增用户</button>
                    <div id="adminCreateUserError" class="login-error"></div>
                </form>
            </article>

            <article class="info-card security-panel-card">
                <div class="section-kicker">用户管理</div>
                <div class="security-card-head">
                    <h3>账号状态与管理操作</h3>
                    <div class="sidebar-text">支持冻结、解冻、解锁、重置密码、删除和定向清理该用户审计日志。</div>
                </div>
                <div id="securityUsers" class="security-user-grid security-scroll-panel">
                    <div class="empty-copy">加载中...</div>
                </div>
            </article>
        </section>

        <section class="info-card security-panel-card">
            <div class="section-kicker">审计日志</div>
            <div class="security-card-head">
                <h3>最近 50 条安全事件</h3>
                <button class="btn btn-outline btn-sm" id="btnClearAllLogs">清空审计日志</button>
            </div>
            <div class="security-filter-row">
                <input class="form-input" id="securityLogFilterUser" type="text" placeholder="按用户名筛选">
                <select class="form-input" id="securityLogFilterEvent">
                    <option value="">全部事件类型</option>
                </select>
                <select class="form-input" id="securityLogFilterSeverity">
                    <option value="">全部风险等级</option>
                    <option value="high">高风险</option>
                    <option value="medium">关注</option>
                    <option value="normal">正常</option>
                </select>
            </div>
            <div id="securityLogs" class="stack-list empty-copy security-scroll-panel">加载中...</div>
        </section>

        <section class="security-reset-modal" id="securityResetModal" hidden>
            <div class="security-reset-modal__backdrop" data-close-reset-modal></div>
            <div class="security-reset-modal__card">
                <div class="security-card-head">
                    <h3>重置用户密码</h3>
                    <button class="btn btn-outline btn-sm" type="button" data-close-reset-modal>关闭</button>
                </div>
                <form id="adminResetPasswordForm" class="login-form login-form--compact">
                    <input class="form-input" id="adminResetTarget" name="username" type="text" readonly>
                    <input class="form-input" name="new_password" type="password" placeholder="输入新密码">
                    <button class="btn btn-primary btn-block" id="btnAdminResetPassword" type="submit">重置密码</button>
                    <div id="adminResetPasswordError" class="login-error"></div>
                </form>
            </div>
        </section>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/security.js"></script>
</body>
</html>
